version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: petfeeder_db
    environment:
      POSTGRES_USER: pet_user
      POSTGRES_PASSWORD: pet_password
      POSTGRES_DB: petfeeder
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: petfeeder_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@petfeeder.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5054:80"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
